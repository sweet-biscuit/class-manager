<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>班級事務整合系統</title>
<style>
  :root{
    --bg:#f1f2f6;
    --surface:#ffffff;
    --surface-2:#f8f9fc;
    --ink:#1c1e2a;
    --muted:#767b8c;
    --line:#e5e7f0;
    --accent:#4f46e5;
    --accent-dark:#3730a3;
    --accent-light:#eef0ff;
    --success:#0f9d58;
    --success-light:#e3f7ec;
    --warning:#d97706;
    --warning-light:#fef3dc;
    --danger:#dc2626;
    --danger-light:#fde8e8;
    --radius:16px;
    --shadow:0 1px 2px rgba(20,20,50,.04), 0 6px 20px rgba(20,20,50,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }
  #app{max-width:1040px;margin:0 auto;padding:18px 14px 70px;}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;}
  .logo{
    width:42px;height:42px;border-radius:13px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;
    box-shadow:var(--shadow);
  }
  .brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;}
  .brand p{margin:1px 0 0;font-size:12px;color:var(--muted);}
  .sync{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .sync .dot{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;}
  .sync.saving .dot{background:var(--warning);}
  .sync.local .dot{background:var(--muted);}
  .sync.error .dot{background:var(--danger);}

  nav.tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;}
  nav.tabs button{
    font-family:inherit;font-size:13.5px;font-weight:600;
    background:var(--surface);border:none;color:var(--muted);
    padding:9px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;
    box-shadow:0 1px 2px rgba(20,20,50,.05);
  }
  nav.tabs button.active{background:var(--accent);color:#fff;}
  nav.tabs button:hover:not(.active){background:var(--accent-light);color:var(--accent-dark);}

  .card{background:var(--surface);border:none;border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .card h2{font-size:16px;margin:0 0 4px;font-weight:700;}
  .card .sub{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .row + .row{margin-top:10px;}

  label.field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);font-weight:600;}
  input,select,textarea{
    font-family:inherit;font-size:16px;color:var(--ink);
    border:1.5px solid var(--line);border-radius:10px;padding:9px 10px;background:var(--surface-2);
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
  textarea{resize:vertical;min-height:90px;font-family:ui-monospace,monospace;font-size:13px;}
  input[type=number]{width:84px;}
  input[type=date]{width:auto;}

  .btn{
    font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;
    border-radius:10px;padding:9px 16px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);
    transition:transform .08s;min-height:40px;
  }
  .btn:active{transform:scale(.97);}
  .btn:hover{background:var(--accent-light);border-color:var(--accent-light);color:var(--accent-dark);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);color:#fff;}
  .btn-danger{color:var(--danger);border-color:var(--danger-light);}
  .btn-danger:hover{background:var(--danger-light);color:var(--danger);}
  .btn-sm{padding:5px 11px;font-size:12px;border-radius:8px;}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}

  /* number grid - working / registration views */
  .num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;max-width:420px;}
  .num-cell{
    aspect-ratio:1;border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;cursor:pointer;user-select:none;-webkit-user-select:none;
    background:var(--surface-2);color:var(--ink);border:1.5px solid var(--line);
    transition:transform .1s;touch-action:manipulation;
  }
  .num-cell:active{transform:scale(.9);}
  .num-cell .sub{font-size:9px;font-weight:600;margin-top:1px;opacity:.85;}
  .num-cell.st-present{background:var(--success-light);color:#0a6b3c;border-color:var(--success-light);}
  .num-cell.st-late{background:var(--warning-light);color:#9a5b04;border-color:var(--warning-light);}
  .num-cell.st-absent{background:var(--danger-light);color:#a31c1c;border-color:var(--danger-light);}
  .num-cell.hw-on{background:var(--success-light);color:#0a6b3c;border-color:var(--success-light);}
  .num-cell.hw-off{background:var(--surface-2);color:var(--muted);}
  .num-cell.included{background:var(--accent-light);color:var(--accent-dark);border-color:var(--accent);}
  .num-cell.excluded{background:var(--surface-2);color:#c2c4d1;}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:10px 0 4px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend i{width:11px;height:11px;border-radius:4px;display:inline-block;}

  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{
    background:var(--surface-2);color:var(--muted);text-align:left;
    padding:9px 12px;font-weight:700;font-size:12px;border-bottom:1px solid var(--line);white-space:nowrap;
  }
  tbody td{padding:8px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--surface-2);}
  .num-col{font-variant-numeric:tabular-nums;width:56px;color:var(--muted);font-weight:600;}

  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
  .b-present{background:var(--success-light);color:#0a6b3c;}
  .b-late{background:var(--warning-light);color:#9a5b04;}
  .b-absent{background:var(--danger-light);color:#a31c1c;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-top:12px;}
  .stat{background:var(--surface-2);border-radius:12px;padding:10px 12px;}
  .stat .n{font-size:20px;font-weight:800;color:var(--accent-dark);}
  .stat .l{font-size:11px;color:var(--muted);font-weight:600;}

  .empty{padding:30px;text-align:center;color:var(--muted);font-size:13.5px;}
  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{border:1.5px solid var(--line);border-radius:999px;padding:7px 15px;font-size:13px;cursor:pointer;background:var(--surface);font-weight:600;color:var(--muted);}
  .pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;}
  .history-item{font-size:12.5px;padding:8px 0;border-bottom:1px dashed var(--line);}
  .history-item .t{color:var(--muted);margin-right:8px;font-variant-numeric:tabular-nums;}
  .name-preview{font-family:ui-monospace,monospace;background:var(--accent-light);padding:2px 9px;border-radius:6px;color:var(--accent-dark);font-weight:700;}
  .confirm-danger{color:var(--danger);font-size:12.5px;font-weight:600;}

  /* grouping */
  .group-board{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;}
  .pool-box,.group-box{
    background:var(--surface-2);border:2px dashed var(--line);border-radius:14px;padding:10px;min-width:150px;min-height:110px;flex:1;
  }
  .pool-box.dragover,.group-box.dragover{border-color:var(--accent);background:var(--accent-light);}
  .pool-box h3,.group-box h3{margin:0 0 8px;font-size:12.5px;font-weight:700;color:var(--muted);}
  .chip-wrap{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    padding:6px 10px;border-radius:9px;font-size:13px;font-weight:700;cursor:grab;user-select:none;
    background:#fff;border:1.5px solid var(--line);
  }
  .chip.picked{outline:2px solid var(--accent);}
  .chip:active{cursor:grabbing;}
  .group-col{border-radius:12px;padding:10px 12px;min-width:150px;flex:1;}
  .group-col h3{margin:0 0 8px;font-size:13px;font-weight:700;}
  .group-col ul{margin:0;padding-left:18px;font-size:13px;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,20,40,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;}
  .modal-box{background:#fff;border-radius:16px;padding:20px;max-width:340px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .modal-box h3{margin:0 0 12px;font-size:15px;}
  .reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .reason-btn{width:100%;}

  @media(max-width:520px){
    .num-grid{max-width:100%;}
    .brand h1{font-size:16px;}
    #app{padding:14px 10px 70px;}
    .card{padding:14px 14px;}
    .btn{padding:11px 14px;}
    nav.tabs button{padding:10px 14px;}
  }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="brand">
      <div class="logo">班</div>
      <div>
        <h1>班級事務整合系統</h1>
        <p>出缺席・成績・作業・分組</p>
      </div>
    </div>
    <div class="sync" id="syncIndicator"><span class="dot"></span><span id="syncText">載入中…</span></div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <div id="content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
(function(){
"use strict";

var STORAGE_KEY = "classroom_system_v2";

// ============ Firebase 雲端同步設定 ============
// 到 https://console.firebase.google.com 建立專案並啟用 Firestore，
// 把「新增網頁應用程式」拿到的設定值填在下面（六個值都要換成你自己的）。
// 沒有填寫（維持 REPLACE_ME）的話，系統會自動改用「只存在這台裝置」的離線模式。
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyC-GZ9Xt_6LR8PPSxkcGvGFPcSu2X28Jvk",
  authDomain: "classroom-3ad82.firebaseapp.com",
  projectId: "classroom-3ad82",
  storageBucket: "classroom-3ad82.firebasestorage.app",
  messagingSenderId: "549583464975",
  appId: "1:549583464975:web:cc84a8cfb3d17c9099917a"
};
var firebaseReady = false;
var db = null;
var docRef = null;

function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === "REPLACE_ME") return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    docRef = db.collection("classroom").doc("shared-state");
    firebaseReady = true;
  }catch(e){ console.error("Firebase 初始化失敗", e); }
}

var ATT_CYCLE = ["出席","遲到","缺席"];
var REASONS = ["事假","病假","公假","喪假","其他","曠課(未請假)"];
var GROUP_COLORS = [
  {bg:"#eef0ff",fg:"#4338ca"},{bg:"#e3f7ec",fg:"#0a6b3c"},{bg:"#fef3dc",fg:"#9a5b04"},
  {bg:"#fde8e8",fg:"#a31c1c"},{bg:"#f3e8ff",fg:"#6d28d9"},{bg:"#e0f7fa",fg:"#0e7490"},
  {bg:"#f0fdf4",fg:"#4d7c0f"},{bg:"#fdf2f8",fg:"#a21caf"}
];

var defaultState = function(){
  return {
    roster: [],
    attendance: {},
    gradeAssignments: [],
    grades: {},
    homeworkAssignments: [],
    homework: {},
    groups: { participantIds:null, mode:"auto", groupCount:4, assignments:{} },
    settings: { showNumber:true, showName:true, nameMode:"full" },
    history: []
  };
};

var state = defaultState();
var activeTab = "roster";
var confirmClearArmed = false;
var pickedStudentId = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function setSync(mode){
  // mode: "saving" | "synced" | "local" | "error"
  var elS = document.getElementById("syncIndicator");
  var txtS = document.getElementById("syncText");
  elS.classList.remove("saving","local","error");
  if(mode==="saving"){ elS.classList.add("saving"); txtS.textContent = "儲存中…"; }
  else if(mode==="synced"){ txtS.textContent = "雲端已同步"; }
  else if(mode==="error"){ elS.classList.add("error"); txtS.textContent = "雲端同步失敗（已存於本機）"; }
  else { elS.classList.add("local"); txtS.textContent = "僅存於此裝置（未設定雲端同步）"; }
}

function applyIncomingState(parsed){
  state = Object.assign(defaultState(), parsed);
  state.groups = Object.assign({participantIds:null,mode:"auto",groupCount:4,assignments:{}}, state.groups||{});
  normalizeAttendance();
}

function loadState(){
  try{
    var cached = localStorage.getItem(STORAGE_KEY);
    if(cached) applyIncomingState(JSON.parse(cached));
  }catch(e){ /* ignore, keep defaults */ }
  render();

  initFirebase();
  if(!firebaseReady){ setSync("local"); return; }

  docRef.onSnapshot(function(snap){
    if(snap.exists){
      var data = snap.data();
      if(data && data.json){
        applyIncomingState(JSON.parse(data.json));
        try{ localStorage.setItem(STORAGE_KEY, data.json); }catch(e){}
        render();
      }
    } else {
      // 雲端還沒有資料，用目前狀態建立第一份文件
      docRef.set({ json: JSON.stringify(state), updatedAt: Date.now() }).catch(function(e){ console.error(e); });
    }
    setSync("synced");
  }, function(err){
    console.error("即時同步失敗", err);
    setSync("error");
  });
}

async function persist(logText){
  setSync("saving");
  if(logText){
    state.history.unshift({ time: new Date().toLocaleString("zh-TW",{hour12:false}), text: logText });
    if(state.history.length > 200) state.history = state.history.slice(0,200);
  }
  var json = JSON.stringify(state);
  try{ localStorage.setItem(STORAGE_KEY, json); }catch(e){ console.error("本機儲存失敗", e); }

  if(firebaseReady){
    try{
      await docRef.set({ json: json, updatedAt: Date.now() });
      setSync("synced");
    }catch(e){
      console.error("雲端儲存失敗", e);
      setSync("error");
    }
  } else {
    setSync("local");
  }
}
function normalizeAttendance(){
  Object.keys(state.attendance).forEach(function(date){
    var day = state.attendance[date];
    Object.keys(day).forEach(function(sid){
      var rec = day[sid];
      if(typeof rec === "string"){
        if(["事假","病假","公假","喪假"].indexOf(rec)>=0) day[sid] = {status:"缺席", reason:rec};
        else if(rec === "曠課") day[sid] = {status:"缺席", reason:"曠課(未請假)"};
        else if(rec === "早退") day[sid] = {status:"遲到", reason:null};
        else if(ATT_CYCLE.indexOf(rec)>=0) day[sid] = {status:rec, reason:null};
        else day[sid] = {status:"出席", reason:null};
      }
    });
  });
}

// ---------- helpers ----------
function maskName(name){
  if(!name) return name;
  var arr = Array.from(name);
  var len = arr.length;
  if(len <= 1) return name;
  if(len === 2) return arr[0] + "O";
  return arr[0] + "O".repeat(len-2) + arr[len-1];
}
function displayName(name){
  return state.settings.nameMode === "masked" ? maskName(name) : name;
}
function identity(stu){
  var parts = [];
  if(state.settings.showNumber) parts.push(stu.number);
  if(state.settings.showName) parts.push(displayName(stu.name));
  if(parts.length===0) return stu.number || displayName(stu.name);
  return parts.join(" ");
}
function sortedRoster(){
  return state.roster.slice().sort(function(a,b){
    var na = parseFloat(a.number), nb = parseFloat(b.number);
    if(!isNaN(na) && !isNaN(nb)) return na-nb;
    return String(a.number).localeCompare(String(b.number));
  });
}
function todayStr(){
  var d = new Date();
  var m = String(d.getMonth()+1).padStart(2,"0");
  var day = String(d.getDate()).padStart(2,"0");
  return d.getFullYear() + "-" + m + "-" + day;
}
function el(tag, attrs, children){
  var e = document.createElement(tag);
  attrs = attrs || {};
  Object.keys(attrs).forEach(function(k){
    if(k === "class") e.className = attrs[k];
    else if(k === "html") e.innerHTML = attrs[k];
    else if(k.indexOf("on")===0 && typeof attrs[k]==="function") e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  (children||[]).forEach(function(c){ if(c) e.appendChild(c); });
  return e;
}
function txt(s){ return document.createTextNode(s); }

function downloadBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}

function captureAsImage(containerId, filename){
  var node = document.getElementById(containerId);
  if(!node || typeof html2canvas === "undefined"){ alert("圖片功能載入中，請稍後再試"); return; }
  html2canvas(node, {backgroundColor:"#ffffff", scale:1.5}).then(function(canvas){
    canvas.toBlob(function(blob){
      downloadBlob(blob, filename);
      persist("匯出圖片：" + filename);
    });
  });
}

// tap vs long-press
function attachTapHold(elm, onTap, onLongPress, holdMs){
  holdMs = holdMs || 550;
  var timer=null, longFired=false, moved=false, startX=0, startY=0;
  function start(e){
    longFired=false; moved=false;
    startX=e.clientX; startY=e.clientY;
    timer = setTimeout(function(){ longFired=true; if(onLongPress) onLongPress(); }, holdMs);
  }
  function move(e){
    if(Math.abs(e.clientX-startX)>8||Math.abs(e.clientY-startY)>8){ moved=true; clearTimeout(timer); }
  }
  function end(){
    clearTimeout(timer);
    if(!longFired && !moved) onTap();
  }
  elm.addEventListener("pointerdown", start);
  elm.addEventListener("pointermove", move);
  elm.addEventListener("pointerup", end);
  elm.addEventListener("pointercancel", function(){clearTimeout(timer);});
  elm.addEventListener("contextmenu", function(e){e.preventDefault();});
}

function openReasonModal(title, onPick){
  var overlay = el("div",{class:"modal-overlay", onclick:function(e){ if(e.target===overlay) close(); }});
  var box = el("div",{class:"modal-box"});
  box.appendChild(el("h3",{},[txt(title)]));
  var grid = el("div",{class:"reason-grid"});
  REASONS.forEach(function(r){
    grid.appendChild(el("button",{class:"btn reason-btn", onclick:function(){ onPick(r); close(); }},[txt(r)]));
  });
  box.appendChild(grid);
  box.appendChild(el("button",{class:"btn", style:"margin-top:12px;width:100%", onclick:close},[txt("取消")]));
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  function close(){ if(overlay.parentNode) document.body.removeChild(overlay); }
}

function saveScore(stu, assignment, v){
  if(!state.grades[assignment.id]) state.grades[assignment.id] = {};
  if(v===undefined || isNaN(v)) delete state.grades[assignment.id][stu.id];
  else state.grades[assignment.id][stu.id] = v;
  persist(assignment.name + "：座號 " + stu.number + " 分數 " + ((v===undefined||isNaN(v)) ? "清空" : v));
  render();
}

function openScoreModal(stu, assignment, currentVal){
  var overlay = el("div",{class:"modal-overlay", onclick:function(e){ if(e.target===overlay) close(); }});
  var box = el("div",{class:"modal-box"});
  box.appendChild(el("h3",{},[txt("座號 " + stu.number + "　" + displayName(stu.name))]));
  box.appendChild(el("p",{class:"sub"},[txt(assignment.name + "（滿分 " + assignment.maxScore + "）")]));
  var input = el("input",{
    type:"number", inputmode:"decimal", min:0, max:assignment.maxScore,
    value: currentVal!==undefined ? currentVal : "",
    style:"width:100%;font-size:26px;text-align:center;padding:12px;margin-bottom:14px;font-weight:700"
  });
  box.appendChild(input);

  var btnRow = el("div",{class:"row"});
  var okBtn = el("button",{class:"btn btn-primary", style:"flex:1", onclick:function(){
    var v = input.value===""?undefined:Number(input.value);
    saveScore(stu, assignment, v);
    close();
  }},[txt("儲存")]);

// ================= ROSTER =================
function parseRosterLine(line, idx){
  var parts = line.split(",").map(function(s){return s.trim();}).filter(Boolean);
  if(parts.length<2) parts = line.split("\t").map(function(s){return s.trim();}).filter(Boolean);
  if(parts.length<2) parts = line.split(/\s+/).map(function(s){return s.trim();}).filter(Boolean);
  if(parts.length>=2 && /^\d+$/.test(parts[0])){
    return { number: parts[0], name: parts.slice(1).join(" ") };
  }
  return { number: String(idx+1), name: parts.join(" ") };
}

  var card = el("div",{class:"card"});
  card.appendChild(el("h2",{},[txt("匯入班級名單")]));

    var text = ta.value.trim();
    if(!text) return;
    var lines = text.split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
    var list = lines.map(function(l,i){ var p = parseRosterLine(l,i); return {id:uid(), number:p.number, name:p.name}; });
    state.roster = list;
    state.attendance = {}; state.grades = {}; state.homework = {};
    state.groups = {participantIds:null, mode:"auto", groupCount:4, assignments:{}};

  fileInput.addEventListener("change", function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var wb = XLSX.read(ev.target.result, {type:"binary"});
        var sheet = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet, {header:1});
        var list = [];
        rows.forEach(function(r, i){
          if(!r || r.length===0) return;
          var c0 = String(r[0]||"").trim(), c1 = String(r[1]||"").trim();
          if(!c0 && !c1) return;
          if(/^\d+$/.test(c0) && c1){ list.push({id:uid(), number:c0, name:c1}); }

          render();
        }
      }catch(err){ alert("讀取檔案失敗，請確認格式"); }
    };
    reader.readAsBinaryString(file);
  });
  var fileLabel = el("label",{class:"btn"},[txt("上傳 CSV/Excel 檔案")]);

  addCard.appendChild(el("div",{class:"row"},[numIn, nameIn, addBtn]));
  content.appendChild(addCard);

  var listCard = el("div",{class:"card"});

        state.roster = state.roster.filter(function(s){return s.id!==stu.id;});

// ================= ATTENDANCE =================
function getAttRecord(date, sid){
  var day = state.attendance[date];
  if(day && day[sid]) return day[sid];
  return {status:"出席", reason:null};
}
function setAttRecord(date, sid, status, reason){
  if(!state.attendance[date]) state.attendance[date] = {};
  state.attendance[date][sid] = {status:status, reason:reason||null};
}
function cycleStatus(cur){
  var idx = ATT_CYCLE.indexOf(cur);
  return ATT_CYCLE[(idx+1) % ATT_CYCLE.length];
}
function statusClass(s){
  if(s==="出席") return "st-present";
  if(s==="遲到") return "st-late";
  return "st-absent";
}

    var cell = el("div",{style:"background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:6px 4px;text-align:center;"});
    cell.appendChild(el("div",{style:"font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"},[txt(identity(stu))]));
    cell.appendChild(el("span",{class:"badge "+(submitted?"b-present":"b-absent"), style:"margin-top:3px;display:inline-block;font-size:10px;padding:2px 6px"},[txt(submitted?"已交":"未交")]));
    wrap.appendChild(cell);
  });
  capCard.appendChild(wrap);
  var statGrid = el("div",{class:"stat-grid"});
  statGrid.appendChild(el("div",{class:"stat"},[el("div",{class:"n"},[txt(submittedCount + "/" + state.roster.length)]), el("div",{class:"l"},[txt("已繳交")])]));
  capCard.appendChild(statGrid);
  content.appendChild(capCard);
  content.appendChild(el("div",{class:"row"},[el("button",{class:"btn", onclick:function(){ captureAsImage("hw-capture", active.name + "_繳交狀況.png"); }},[txt("存成圖片")])]));
}

// ================= GROUPS =================
function ensureParticipants(){
  if(state.groups.participantIds === null){
    state.groups.participantIds = state.roster.map(function(s){return s.id;});
  } else {
    var validIds = {};
    state.roster.forEach(function(s){ validIds[s.id]=true; });
    state.groups.participantIds = state.groups.participantIds.filter(function(id){return validIds[id];});
  }
}
function clampAssignments(){
  var n = state.groups.groupCount;
  Object.keys(state.groups.assignments).forEach(function(id){
    if(state.groups.assignments[id] > n) delete state.groups.assignments[id];
  });
}

function renderGroups(content){
  ensureParticipants();
  var participantSet = {};
  state.groups.participantIds.forEach(function(id){ participantSet[id]=true; });

  var card = el("div",{class:"card"});
  card.appendChild(el("h2",{},[txt("步驟一：選擇參與分組的學生")]));
  card.appendChild(el("p",{class:"sub"},[txt("點一下座號加入／移出分組名單，藍色表示已加入。")]));
  var grid1 = el("div",{class:"num-grid"});
  sortedRoster().forEach(function(stu){
    var included = !!participantSet[stu.id];
    var cell = el("div",{class:"num-cell " + (included?"included":"excluded")},[txt(stu.number)]);
    cell.addEventListener("click", function(){
      if(included){
        state.groups.participantIds = state.groups.participantIds.filter(function(id){return id!==stu.id;});
        delete state.groups.assignments[stu.id];
      } else {
        state.groups.participantIds.push(stu.id);
      }
      persist("分組名單更新");
      render();
    });
    grid1.appendChild(cell);
  });
  card.appendChild(grid1);
  var row0 = el("div",{class:"row", style:"margin-top:10px"});
  row0.appendChild(el("button",{class:"btn btn-sm", onclick:function(){
    state.groups.participantIds = state.roster.map(function(s){return s.id;});
    persist("全選分組名單"); render();
  }},[txt("全選")]));
  row0.appendChild(el("button",{class:"btn btn-sm", onclick:function(){
    state.groups.participantIds = [];
    state.groups.assignments = {};
    persist("清空分組名單"); render();
  }},[txt("全部移除")]));
  card.appendChild(row0);
  content.appendChild(card);

  var setupCard = el("div",{class:"card"});
  setupCard.appendChild(el("h2",{},[txt("步驟二：分組設定")]));
  var modeRow = el("div",{class:"pill-group"});
  modeRow.appendChild(el("div",{class:"pill" + (state.groups.mode==="auto"?" active":""), onclick:function(){ state.groups.mode="auto"; persist("切換為自動分組"); render(); }},[txt("自動分組")]));
  modeRow.appendChild(el("div",{class:"pill" + (state.groups.mode==="manual"?" active":""), onclick:function(){ state.groups.mode="manual"; persist("切換為手動分組"); render(); }},[txt("手動分組")]));
  setupCard.appendChild(modeRow);

  var countIn = el("input",{type:"number", min:1, max:Math.max(1,state.groups.participantIds.length), value: state.groups.groupCount, style:"margin-top:10px"});
  countIn.addEventListener("change", function(){
    state.groups.groupCount = Math.max(1, Number(countIn.value)||1);
    clampAssignments();
    persist("分組數量設定為 " + state.groups.groupCount);
    render();
  });
  setupCard.appendChild(el("div",{class:"row"},[el("label",{class:"field"},[txt("組數"), countIn]),
    state.groups.mode==="auto" ? el("button",{class:"btn btn-primary", onclick:function(){
      var n = state.groups.groupCount;
      var pool = state.groups.participantIds.slice();
      for(var i=pool.length-1;i>0;i--){
        var j = Math.floor(Math.random()*(i+1));
        var tmp = pool[i]; pool[i]=pool[j]; pool[j]=tmp;
      }
      var assign = {};
      pool.forEach(function(id, idx){ assign[id] = (idx % n) + 1; });
      state.groups.assignments = assign;
      persist("執行隨機分組（" + n + " 組）");
      render();
    }},[txt("隨機分組")]) : null
  ]));
  content.appendChild(setupCard);

  if(state.groups.mode==="manual"){
    var n = state.groups.groupCount;
    var manualCard = el("div",{class:"card"});
    manualCard.appendChild(el("h2",{},[txt("步驟三：拖曳分組（或點選座號後點選目標框）")]));
    var board = el("div",{class:"group-board"});

    function makeChip(stu){
      var chip = el("div",{class:"chip" + (pickedStudentId===stu.id?" picked":""), draggable:"true"},[txt(stu.number)]);
      chip.addEventListener("dragstart", function(e){ e.dataTransfer.setData("text/plain", stu.id); });
      chip.addEventListener("click", function(e){
        e.stopPropagation();
        pickedStudentId = (pickedStudentId===stu.id) ? null : stu.id;
        render();
      });
      return chip;
    }
    function makeDropzone(container, targetGroup){
      container.addEventListener("dragover", function(e){ e.preventDefault(); container.classList.add("dragover"); });
      container.addEventListener("dragleave", function(){ container.classList.remove("dragover"); });
      container.addEventListener("drop", function(e){
        e.preventDefault(); container.classList.remove("dragover");
        var sid = e.dataTransfer.getData("text/plain");
        if(!sid) return;
        if(targetGroup===0) delete state.groups.assignments[sid];
        else state.groups.assignments[sid] = targetGroup;
        persist("手動分組更新");
        render();
      });
      container.addEventListener("click", function(){
        if(!pickedStudentId) return;
        if(targetGroup===0) delete state.groups.assignments[pickedStudentId];
        else state.groups.assignments[pickedStudentId] = targetGroup;
        pickedStudentId = null;
        persist("手動分組更新");
        render();
      });
    }

    var poolBox = el("div",{class:"pool-box"});
    poolBox.appendChild(el("h3",{},[txt("學生池（尚未分組）")]));
    var poolChips = el("div",{class:"chip-wrap"});
    sortedRoster().forEach(function(stu){
      if(!participantSet[stu.id]) return;
      if(!state.groups.assignments[stu.id]) poolChips.appendChild(makeChip(stu));
    });
    poolBox.appendChild(poolChips);
    makeDropzone(poolBox, 0);
    board.appendChild(poolBox);

    for(var g=1; g<=n; g++){
      (function(g){
        var color = GROUP_COLORS[(g-1)%GROUP_COLORS.length];
        var box = el("div",{class:"group-box", style:"background:"+color.bg});
        box.appendChild(el("h3",{style:"color:"+color.fg},[txt("第 " + g + " 組")]));
        var chips = el("div",{class:"chip-wrap"});
        sortedRoster().forEach(function(stu){
          if(!participantSet[stu.id]) return;
          if(state.groups.assignments[stu.id]===g) chips.appendChild(makeChip(stu));
        });
        box.appendChild(chips);
        makeDropzone(box, g);
        board.appendChild(box);
      })(g);
    }
    manualCard.appendChild(board);
    if(pickedStudentId){
      manualCard.appendChild(el("p",{class:"hint"},[txt("已選取座號，點選上方任一框即可移動過去。")]));
    }
    content.appendChild(manualCard);
  }

  var n2 = state.groups.groupCount;
  var capCard = el("div",{class:"card", id:"group-capture"});
  capCard.appendChild(el("h2",{},[txt("分組結果")]));
  var resultGrid = el("div",{class:"row", style:"align-items:flex-start"});
  for(var g2=1; g2<=n2; g2++){
    (function(g2){
      var color = GROUP_COLORS[(g2-1)%GROUP_COLORS.length];
      var col = el("div",{class:"group-col", style:"background:"+color.bg});
      col.appendChild(el("h3",{style:"color:"+color.fg},[txt("第 " + g2 + " 組")]));
      var ul = el("ul");
      var any=false;
      sortedRoster().forEach(function(stu){
        if(participantSet[stu.id] && state.groups.assignments[stu.id]===g2){
          ul.appendChild(el("li",{},[txt(identity(stu))]));
          any=true;
        }
      });
      if(!any) ul.appendChild(el("li",{style:"color:var(--muted)"},[txt("尚無成員")]));
      col.appendChild(ul);
      resultGrid.appendChild(col);
    })(g2);
  }
  capCard.appendChild(resultGrid);
  content.appendChild(capCard);
  content.appendChild(el("div",{class:"row"},[el("button",{class:"btn", onclick:function(){ captureAsImage("group-capture", "分組結果.png"); }},[txt("存成圖片")])]));
}

// ================= EXPORT & SETTINGS =================
function renderExport(content){
  var syncCard = el("div",{class:"card"});
  syncCard.appendChild(el("h2",{},[txt("雲端同步狀態")]));
  if(firebaseReady){
    syncCard.appendChild(el("p",{class:"sub"},[txt("已連接 Firebase，所有裝置開啟此檔案會共用同一份資料，並即時互相更新。")]));
  } else {
    syncCard.appendChild(el("p",{class:"sub"},[txt("尚未設定雲端同步，資料僅儲存在目前這台裝置的瀏覽器中。若要多裝置／多人共用即時同步，請在檔案內的 FIREBASE_CONFIG 填入你的 Firebase 專案設定。")]));
  }
  content.appendChild(syncCard);

  var card = el("div",{class:"card"});
  card.appendChild(el("h2",{},[txt("結果顯示設定")]));
  card.appendChild(el("p",{class:"sub"},[txt("此設定僅套用於「結果」表格、Excel 匯出與存成的圖片；登記畫面一律只顯示座號。")]));

  var numChk = el("input",{type:"checkbox"});
  numChk.checked = state.settings.showNumber;
  numChk.addEventListener("change", function(){
    if(!numChk.checked && !state.settings.showName){ numChk.checked = true; return; }
    state.settings.showNumber = numChk.checked; persist("變更顯示設定"); render();
  });
  var nameChk = el("input",{type:"checkbox"});
  nameChk.checked = state.settings.showName;
  nameChk.addEventListener("change", function(){
    if(!nameChk.checked && !state.settings.showNumber){ nameChk.checked = true; return; }
    state.settings.showName = nameChk.checked; persist("變更顯示設定"); render();
  });

  var row1 = el("div",{class:"row"});
  var l1 = el("label",{}); l1.appendChild(numChk); l1.appendChild(txt(" 顯示座號"));
  var l2 = el("label",{}); l2.appendChild(nameChk); l2.appendChild(txt(" 顯示姓名"));
  row1.appendChild(l1); row1.appendChild(l2);
  card.appendChild(row1);

  var modeRow = el("div",{class:"row", style:"margin-top:10px"});
  modeRow.appendChild(el("div",{class:"pill" + (state.settings.nameMode==="full"?" active":""), onclick:function(){
    state.settings.nameMode="full"; persist("變更姓名顯示為完整"); render();
  }},[txt("姓名完整顯示")]));
  modeRow.appendChild(el("div",{class:"pill" + (state.settings.nameMode==="masked"?" active":""), onclick:function(){
    state.settings.nameMode="masked"; persist("變更姓名顯示為遮蔽"); render();
  }},[txt("姓名遮蔽")]));
  card.appendChild(modeRow);

  var sample = state.roster[0] ? state.roster[0].name : "王小明大";
  card.appendChild(el("p",{class:"hint"},[txt("預覽："), el("span",{class:"name-preview"},[txt(identity({number:"01", name:sample}))])]));
  content.appendChild(card);

  var expCard = el("div",{class:"card"});
  expCard.appendChild(el("h2",{},[txt("匯出 Excel")]));
  expCard.appendChild(el("p",{class:"sub"},[txt("匯出名單、出缺席、成績、作業與分組資料為單一 Excel 檔案（依上方顯示設定呈現）。")]));
  expCard.appendChild(el("div",{class:"row"},[
    el("button",{class:"btn btn-primary", onclick: exportExcel},[txt("匯出全部資料為 Excel")])
  ]));
  content.appendChild(expCard);

  var dangerCard = el("div",{class:"card"});
  dangerCard.appendChild(el("h2",{},[txt("清除資料")]));
  dangerCard.appendChild(el("p",{class:"sub"},[txt("將清除所有名單、出缺席、成績、作業、分組與歷史紀錄，此動作無法復原。")]));
  var clearBtn = el("button",{class:"btn btn-danger", onclick:function(){
    if(!confirmClearArmed){ confirmClearArmed = true; render(); return; }
    state = defaultState();
    confirmClearArmed = false;
    persist("清除所有資料");
    render();
  }},[txt(confirmClearArmed ? "再按一次以確認清除" : "清除所有資料")]);
  dangerCard.appendChild(clearBtn);
  if(confirmClearArmed){
    dangerCard.appendChild(el("p",{class:"confirm-danger"},[txt("請再次點擊按鈕以確認，或切換分頁取消。")]));
  }
  content.appendChild(dangerCard);
}

function exportExcel(){
  var wb = XLSX.utils.book_new();
  var roster = sortedRoster();

  var rosterRows = [["座號","姓名"]];
  roster.forEach(function(stu){ rosterRows.push([state.settings.showNumber?stu.number:"", state.settings.showName?displayName(stu.name):""]); });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rosterRows), "名單");

  var dates = Object.keys(state.attendance).sort();
  var attHeader = ["座號","姓名"].concat(dates);
  var attRows = [attHeader];
  roster.forEach(function(stu){
    var row = [state.settings.showNumber?stu.number:"", state.settings.showName?displayName(stu.name):""];
    dates.forEach(function(d){
      var rec = state.attendance[d] && state.attendance[d][stu.id];
      row.push(rec ? (rec.status + (rec.reason?("("+rec.reason+")"):"")) : "");
    });
    attRows.push(row);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(attRows), "出缺席");

  var gHeader = ["座號","姓名"].concat(state.gradeAssignments.map(function(a){return a.name + "(滿分" + a.maxScore + ")";}));
  var gRows = [gHeader];
  roster.forEach(function(stu){
    var row = [state.settings.showNumber?stu.number:"", state.settings.showName?displayName(stu.name):""];
    state.gradeAssignments.forEach(function(a){ var s=state.grades[a.id]||{}; row.push(s[stu.id]!==undefined?s[stu.id]:""); });
    gRows.push(row);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(gRows), "成績");

  var hHeader = ["座號","姓名"].concat(state.homeworkAssignments.map(function(a){return a.name;}));
  var hRows = [hHeader];
  roster.forEach(function(stu){
    var row = [state.settings.showNumber?stu.number:"", state.settings.showName?displayName(stu.name):""];
    state.homeworkAssignments.forEach(function(a){ var s=state.homework[a.id]||{}; row.push(s[stu.id]?"已交":"未交"); });
    hRows.push(row);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(hRows), "作業");

  ensureParticipants();
  var participantSet = {};
  state.groups.participantIds.forEach(function(id){ participantSet[id]=true; });
  var grRows = [["座號","姓名","組別"]];
  roster.forEach(function(stu){
    var label = !participantSet[stu.id] ? "未參與分組" : ("第 " + (state.groups.assignments[stu.id]||"—") + " 組");
    grRows.push([state.settings.showNumber?stu.number:"", state.settings.showName?displayName(stu.name):"", label]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(grRows), "分組");

  var wbout = XLSX.write(wb, {bookType:"xlsx", type:"array"});
  downloadBlob(new Blob([wbout], {type:"application/octet-stream"}), "班級事務紀錄_" + todayStr() + ".xlsx");
  persist("匯出 Excel 檔案");
}

// ================= HISTORY =================
function renderHistory(content){
  var card = el("div",{class:"card"});
  card.appendChild(el("h2",{},[txt("歷史紀錄")]));
  card.appendChild(el("p",{class:"sub"},[txt("每次儲存、匯出、修改都會記錄於此（最多保留 200 筆）。")]));
  if(state.history.length===0){
    card.appendChild(el("div",{class:"empty"},[txt("尚無歷史紀錄。")]));
  } else {
    state.history.forEach(function(h){
      card.appendChild(el("div",{class:"history-item"},[el("span",{class:"t"},[txt(h.time)]), txt(h.text)]));
    });
  }
  content.appendChild(card);
}

loadState();
})();
</script>
